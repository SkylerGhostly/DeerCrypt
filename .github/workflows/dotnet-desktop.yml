name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-win-x64:
    name: Build (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish DeerCrypt/DeerCrypt.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:PublishDir="${{ github.workspace }}/publish/win-x64"
        shell: pwsh

      - name: Archive
        run: >
          Compress-Archive
          -Path "${{ github.workspace }}/publish/win-x64/*"
          -DestinationPath "DeerCrypt-${{ github.ref_name }}-win-x64.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: win-x64
          path: DeerCrypt-${{ github.ref_name }}-win-x64.zip

  build-linux-x64:
    name: Build (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish DeerCrypt/DeerCrypt.csproj
          -c Release
          -r linux-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:PublishDir="${{ github.workspace }}/publish/linux-x64"

      - name: Archive
        run: |
          tar -czf "DeerCrypt-${{ github.ref_name }}-linux-x64.tar.gz" \
            -C "${{ github.workspace }}/publish/linux-x64" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: linux-x64
          path: DeerCrypt-${{ github.ref_name }}-linux-x64.tar.gz

  release:
    name: Create Release
    needs: [build-win-x64, build-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeerCrypt ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
